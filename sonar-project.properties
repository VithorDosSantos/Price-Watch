sonar.projectKey=VithorDosSantos_Price-Watch
sonar.organization=vithordossantos
sonar.projectName=Price-Watch
sonar.projectVersion=1.0.0

# Source and build settings
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/*.d.ts,**/node_modules/**,frontend/src/main.tsx,frontend/src/vite-env.d.ts
sonar.test.exclusions=frontend/tests/e2e/**

# Coverage (paths relative to project root)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.coverage.exclusions=**/*.d.ts,**/index.ts,backend/src/types/**,frontend/src/main.tsx

# TypeScript
sonar.typescript.tsconfigPaths=backend/tsconfig.json,frontend/tsconfig.json

# Analysis settings
sonar.qualitygate.wait=false
