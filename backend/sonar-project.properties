sonar.projectKey=VithorDosSantos_Price-Watch
sonar.organization=vithordossantos
sonar.projectName=Price-Watch
sonar.projectVersion=1.0.0

# Source and build settings
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts
sonar.sourceEncoding=UTF-8

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.d.ts,**/index.ts,src/types/**

# Analysis settings
sonar.qualitygate.wait=true
sonar.links.homepage=https://github.com/seu-usuario/Price-Watch
sonar.links.scm=https://github.com/seu-usuario/Price-Watch
