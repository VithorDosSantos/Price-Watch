services:
  postgres:
    image: postgres:16-alpine
    container_name: pricewatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pricewatch
      POSTGRES_USER: pricewatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricewatch}
    ports:
      - "5433:5432"
    volumes:
      - pricewatch_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pricewatch-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pricewatch.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - pricewatch_pgadmin_data:/var/lib/pgadmin

volumes:
  pricewatch_postgres_data:
  pricewatch_pgadmin_data:
