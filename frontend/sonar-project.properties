sonar.projectKey=VithorDosSantos_Price-Watch
sonar.organization=vithordossantos
sonar.projectName=Price-Watch
sonar.projectVersion=1.0.0

# Source and build settings
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.{ts,tsx}
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/*.d.ts,src/main.tsx,src/vite-env.d.ts
sonar.test.exclusions=tests/e2e/**

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.d.ts,src/main.tsx,src/**/index.ts,tests/**

# TypeScript + React
sonar.typescript.tsconfigPath=tsconfig.json

# Analysis settings
sonar.qualitygate.wait=true
sonar.links.homepage=https://github.com/seu-usuario/Price-Watch
sonar.links.scm=https://github.com/seu-usuario/Price-Watch
