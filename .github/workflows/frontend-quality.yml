name: Frontend Quality Checks

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality.yml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  test-and-coverage:
    name: Run frontend tests and code coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linter
        run: cd frontend && npm run lint

      - name: Run format check
        run: cd frontend && npm run format:check

      - name: Run tests with coverage
        run: cd frontend && npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

      - name: Run E2E tests
        run: cd frontend && npm run test:e2e
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: frontend-e2e-results
          path: frontend/playwright-report/

      - name: Check coverage threshold
        run: |
          cd frontend
          if [ -f coverage/coverage-final.json ]; then
            COVERAGE=$(grep -o '"lines"[^,]*' coverage/coverage-final.json | grep -o '[0-9.]*' | head -1)
            if (( $(echo "$COVERAGE < 70" | bc -l) )); then
              echo "::warning::Code coverage $COVERAGE% is below 70% threshold (target: 70-80%)"
            else
              echo "✅ Code coverage $COVERAGE% meets or exceeds 70% threshold"
            fi
          fi
