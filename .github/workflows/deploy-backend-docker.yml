name: Deploy Backend Docker

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-docker.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  test-and-coverage:
    name: Run tests and code coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run linter
        run: cd backend && npm run lint

      - name: Run tests with coverage
        run: cd backend && npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage/

      - name: Check coverage threshold
        run: |
          cd backend
          COVERAGE=$(grep -o '"lines"[^,]*' coverage/coverage-final.json | grep -o '[0-9.]*' | head -1)
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Code coverage $COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "✅ Code coverage $COVERAGE% meets or exceeds 70% threshold"

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test-and-coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run tests with coverage
        run: cd backend && npm run coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectBaseDir=./backend
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  docker-build:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    needs: [test-and-coverage, sonarcloud]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: pricewatch-backend:ci

  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret."
            exit 1
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
